<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIN - Bytecode Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .viz-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .viz-panel {
            border: 1px solid var(--border);
            padding: 20px;
            background-color: var(--code-bg);
            height: 600px;
            overflow-y: auto;
            position: relative;
        }

        .viz-panel h3 {
            position: sticky;
            top: -20px;
            background: var(--code-bg);
            border-bottom: 1px solid var(--border);
            margin: 0 -20px 15px -20px;
            padding: 10px 20px;
            z-index: 10;
            font-family: monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent);
        }

        .line {
            font-family: monospace;
            font-size: 0.85rem;
            padding: 4px 8px;
            cursor: pointer;
            border-left: 3px solid transparent;
            color: #888;
        }

        .line:hover {
            background: rgba(255,255,255,0.03);
        }

        .line.active {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-left-color: var(--accent);
        }

        .stack-item {
            border: 1px solid var(--border);
            margin-bottom: 5px;
            padding: 8px;
            background: var(--bg);
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--fg);
        }

        .stack-item.new {
            border-color: var(--accent);
            color: var(--accent);
        }

        .stack-item.frame {
            border-left: 4px solid var(--accent);
            text-align: left;
            font-size: 0.75rem;
        }

        .controls {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid var(--border);
            background: var(--code-bg);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        button, select {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 700;
        }

        button:hover { opacity: 0.9; }

        .search-box {
            width: calc(100% - 40px);
            margin: 10px 20px 20px 20px;
            padding: 8px 12px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            color: var(--fg);
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .input-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .input-area, .intellisense-overlay {
            width: 100%;
            height: 200px;
            font-family: monospace;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .input-area {
            background: transparent;
            color: transparent;
            caret-color: var(--fg);
            resize: vertical;
            position: relative;
            z-index: 2;
        }

        .intellisense-overlay {
            position: absolute;
            top: 0;
            left: 0;
            background: var(--code-bg);
            color: var(--fg);
            z-index: 1;
            pointer-events: none;
            overflow-y: auto;
        }

        .syntax-opcode { color: var(--accent); font-weight: bold; }
        .syntax-string { color: #ce9178; }
        .syntax-comment { color: #6a9955; font-style: italic; }
        .syntax-arg { color: #b5cea8; }

        #console-output {
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.85rem;
            color: var(--fg);
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .action-display {
            background: var(--code-bg);
            border: 1px solid var(--border);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            border-left: 5px solid var(--accent);
        }

        .action-display strong {
            color: var(--accent);
            margin-right: 10px;
            text-transform: uppercase;
        }

        h4 {
            font-family: monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            margin: 15px 0 10px 0;
        }

        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>ELIN_SYSTEM</h1>
            <p style="font-size: 0.7rem; color: #666; font-family: monospace;">// VISUALIZER</p>
        </div>

        <input type="text" class="search-box" placeholder="Search sections..." id="sidebar-search">

        <div id="nav-container">
            <h2>Navigation</h2>
            <ul class="sidebar-links">
                <li><a href="index.html">← Back to Spec</a></li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <span class="lesson-meta">System Tool</span>
            <h1>ELIN VISUALIZER</h1>
            <p style="font-style: italic; color: #666;">Bytecode Runtime Inspection Tool</p>
        </header>

        <section id="setup">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                <h2>Load Program</h2>
                <select id="example-select" onchange="loadExample(this.value)">
                    <option value="">Select Example...</option>
                    <option value="hello">Hello World</option>
                    <option value="fib">Fibonacci (Recursive)</option>
                    <option value="math">Math Operations</option>
                    <option value="loop">Array Loop</option>
                </select>
            </div>
            
            <div class="input-container">
                <textarea id="source-input" class="input-area" placeholder="Paste .outz content here..." oninput="updateIntellisense()" onscroll="syncScroll()"></textarea>
                <div id="intellisense-overlay" class="intellisense-overlay"></div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="file" id="file-input" accept=".outz" style="font-family: monospace; font-size: 0.8rem; color: #666;">
                <button onclick="loadFromInput()">Load Source</button>
            </div>
        </section>

        <section id="visualizer" style="display:none;">
            <div class="controls">
                <button onclick="step()">Step Into</button>
                <button id="btn-run" onclick="run()">Run All</button>
                <button onclick="reset()">Reset</button>

                <div style="display:inline-block; margin: 0 15px; padding-left: 15px; border-left: 1px solid var(--border);">
                    <label for="speed-slider" style="font-family:monospace; font-size:0.8rem;">Speed:</label>
                    <input type="range" id="speed-slider" min="50" max="1500" step="50" value="600" oninput="updateSpeed(this.value)">
                    <span id="speed-disp" style="font-family:monospace; font-size:0.8rem; min-width: 50px; display:inline-block;">600ms</span>
                </div>

                <span id="status" style="margin-left: auto; font-family: monospace; font-size: 0.8rem; color: var(--accent);">READY</span>
            </div>

            <div id="action-display" class="action-display">
                Waiting to start...
            </div>

            <div class="viz-container">
                <div class="viz-panel" id="code-panel">
                    <h3>Source Bytecode</h3>
                    <div id="code-display"></div>
                </div>

                <div class="viz-panel" id="stack-panel">
                    <h3>Evaluator</h3>
                    <h4>Call Stack</h4>
                    <div id="callstack-display"></div>
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                    <h4>Evaluation Stack</h4>
                    <div id="stack-display"></div>
                </div>

                <div class="viz-panel" id="mem-panel">
                    <h3>Memory / IO</h3>
                    <h4>Global Variables</h4>
                    <div id="vars-display"></div>
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                    <h4>Console Output</h4>
                    <div id="console-output"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="vm.js"></script>
    <script>
        // Sidebar Search
        document.getElementById('sidebar-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const links = document.querySelectorAll('.sidebar-links li');
            links.forEach(li => {
                const text = li.textContent.toLowerCase();
                li.style.display = text.includes(term) ? 'block' : 'none';
            });
            const headers = document.querySelectorAll('.sidebar h2');
            headers.forEach(h => {
                const nextUl = h.nextElementSibling;
                if (nextUl && nextUl.tagName === 'UL') {
                    const hasVisible = Array.from(nextUl.children).some(li => li.style.display !== 'none');
                    h.style.display = hasVisible ? 'block' : 'none';
                }
            });
        });

        function syncScroll() {
            const input = document.getElementById('source-input');
            const overlay = document.getElementById('intellisense-overlay');
            overlay.scrollTop = input.scrollTop;
            overlay.scrollLeft = input.scrollLeft;
        }

        function updateIntellisense() {
            const input = document.getElementById('source-input');
            const overlay = document.getElementById('intellisense-overlay');
            let text = input.value;
            
            // Basic Syntax Highlighting Logic
            const highlighted = text.split('\n').map(line => {
                if (!line.trim()) return '';
                if (line.trim().startsWith('#')) return `<span class="syntax-comment">${line}</span>`;
                
                const parts = line.split(/\s+/);
                if (line.startsWith('STR ')) {
                    return `<span class="syntax-opcode">STR</span> <span class="syntax-arg">${parts[1]}</span> <span class="syntax-string">${parts.slice(2).join(' ')}</span>`;
                }
                if (line.startsWith('ARR ')) {
                    return `<span class="syntax-opcode">ARR</span> <span class="syntax-arg">${parts[1]}</span> <span class="syntax-arg">${parts.slice(2).join(' ')}</span>`;
                }

                return line.replace(/^(\d+)/, '<span class="syntax-opcode">$1</span>')
                           .replace(/(\s\d+)/g, ' <span class="syntax-arg">$1</span>');
            }).join('\n');

            overlay.innerHTML = highlighted + '\n';
            syncScroll();
        }

        // Copy buttons for visualizer panels
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.viz-panel').forEach(panel => {
                if (panel.id === 'code-panel' || panel.id === 'mem-panel') {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.textContent = 'Copy';
                    btn.style.opacity = '1'; // Always show in visualizer
                    btn.onclick = () => {
                        const content = panel.innerText;
                        navigator.clipboard.writeText(content).then(() => {
                            btn.textContent = 'Copied!';
                            btn.classList.add('copied');
                            setTimeout(() => {
                                btn.textContent = 'Copy';
                                btn.classList.remove('copied');
                            }, 2000);
                        });
                    };
                    panel.appendChild(btn);
                }
            });
        });
    </script>
</body>

</html>
