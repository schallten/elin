<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIN - Bytecode Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .viz-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .viz-panel {
            border: 1px solid var(--border-color);
            padding: 20px;
            background-color: #fff;
            height: 500px;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        .viz-panel h3 {
            position: sticky;
            top: -20px;
            background: #fff;
            border-bottom: 2px solid var(--text-primary);
            margin: 0 -20px 15px -20px;
            padding: 10px 20px;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .line {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
            color: var(--text-secondary);
        }

        .line:hover {
            background: var(--bg-main);
        }

        .line.active {
            background-color: var(--text-primary);
            color: #fff;
            border-left-color: var(--accent-orange);
        }

        .stack-item {
            border: 1px solid var(--border-color);
            margin-bottom: 5px;
            padding: 8px;
            background: var(--bg-main);
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            animation: slideIn 0.2s ease-out;
        }

        .stack-item.new {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
            font-weight: 600;
        }

        .stack-item.frame {
            border-left: 6px solid var(--accent-orange);
            background: #fff;
            text-align: left;
            font-size: 0.75rem;
        }

        .controls {
            margin: 30px 0;
            padding: 25px;
            border: 1px solid var(--border-color);
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: var(--text-primary);
            color: #fff;
            border: none;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-orange);
        }

        .input-area {
            width: 100%;
            height: 120px;
            font-family: var(--font-mono);
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            font-size: 0.85rem;
            resize: vertical;
        }

        #console-output {
            font-family: var(--font-mono);
            white-space: pre-wrap;
            font-size: 0.85rem;
            color: var(--text-primary);
            padding: 10px;
            background: #fdfdfd;
            border: 1px solid #eee;
        }

        .action-display {
            background-color: var(--text-primary);
            color: #fff;
            padding: 15px 25px;
            margin-bottom: 30px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            border-left: 10px solid var(--accent-orange);
        }

        .action-display strong {
            color: var(--accent-orange);
            margin-right: 15px;
            text-transform: uppercase;
            font-weight: 700;
        }

        h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 15px 0 10px 0;
            letter-spacing: 1px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ELIN VISUALIZER</h1>
            <p class="subtitle">Bytecode Runtime Inspection Tool</p>
        </header>

        <nav>
            <a href="index.html">Back to Spec</a>
        </nav>

        <section id="setup">
            <h2>Load Program</h2>
            <textarea id="source-input" class="input-area" placeholder="Paste .outz content here..."></textarea>
            <div class="file-upload">
                <input type="file" id="file-input" accept=".outz">
                <button onclick="loadFromInput()">Load Source</button>
            </div>
        </section>

        <section id="visualizer" style="display:none;">
            <div class="controls">
                <button onclick="step()">Step Into</button>
                <button id="btn-run" onclick="run()">Run All</button>
                <button onclick="reset()">Reset</button>

                <div
                    style="display:inline-block; margin: 0 15px; vertical-align:middle; border-left: 1px solid var(--border-color); padding-left: 15px;">
                    <label for="speed-slider" style="font-family:var(--font-mono); font-size:0.8rem;">Speed:</label>
                    <input type="range" id="speed-slider" min="50" max="1500" step="50" value="600"
                        oninput="updateSpeed(this.value)">
                    <span id="speed-disp"
                        style="font-family:var(--font-mono); font-size:0.8rem; min-width: 50px; display:inline-block;">600ms</span>
                </div>

                <span id="status" style="margin-left: 10px; color: var(--accent-color);">READY</span>
            </div>

            <div id="action-display" class="action-display">
                Waiting to start...
            </div>

            <div class="viz-container">
                <!-- Code Panel -->
                <div class="viz-panel" id="code-panel">
                    <h3>Source Bytecode</h3>
                    <div id="code-display"></div>
                </div>

                <!-- Evaluator Panel -->
                <div class="viz-panel" id="stack-panel">
                    <h3>Evaluator</h3>
                    <h4>Call Stack (Frames)</h4>
                    <div id="callstack-display"></div>
                    <hr>
                    <h4>Evaluation Stack</h4>
                    <div id="stack-display"></div>
                </div>

                <!-- Memory Panel -->
                <div class="viz-panel" id="mem-panel">
                    <h3>Memory / IO</h3>
                    <h4>Global Variables</h4>
                    <div id="vars-display"></div>
                    <hr>
                    <h4>Console Output</h4>
                    <div id="console-output"></div>
                </div>
            </div>
        </section>

        <footer>
            <p>ELIN_VIZ // REF_ID: 0xDEADBEEF // NO_WARRANTY</p>
        </footer>
    </div>
    <script src="vm.js"></script>
</body>

</html>
