{% extends "base.html" %}

{% block content %}
{{ super() }}

{% if page.meta.get("custom_template") == "visualizer" %}
<style>
    .viz-app {
        text-align: center;
        margin-bottom: 2rem;
    }
    .viz-embed {
        border: 1px solid var(--md-default-fg-color--lightest);
        border-radius: 8px;
        overflow: hidden;
        margin: 2rem 0;
    }
    .viz-panel {
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
    }
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        background: rgba(0,0,0,0.2);
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
        font-family: monospace;
        font-size: 0.85rem;
        color: var(--md-accent-fg-color);
    }
    .panel-controls {
        display: flex;
        gap: 0.5rem;
    }
    .panel-controls button {
        padding: 0.25rem 0.5rem;
        background: var(--md-default-fg-color--lightest);
        border: none;
        border-radius: 4px;
        color: var(--md-default-fg-color);
        font-family: monospace;
        font-size: 0.75rem;
        cursor: pointer;
    }
    .panel-controls button:hover {
        background: var(--md-accent-fg-color);
        color: var(--md-accent-bg-color);
    }
    #source-input {
        width: 100%;
        min-height: 150px;
        padding: 1rem;
        background: var(--md-code-bg-color);
        border: none;
        color: var(--md-code-fg-color);
        font-family: monospace;
        font-size: 0.85rem;
        resize: vertical;
    }
    #source-input:focus {
        outline: none;
    }
    .bytecode-output, .eval-section, .output-container {
        padding: 1rem;
        font-family: monospace;
        font-size: 0.8rem;
        min-height: 100px;
    }
    .stack-container, .callstack-container, .vars-container {
        padding: 0.5rem;
        font-family: monospace;
        font-size: 0.8rem;
    }
    .output-container {
        color: #4ade80;
        white-space: pre-wrap;
    }
    .viz-controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: rgba(0,0,0,0.2);
        border-top: 1px solid var(--md-default-fg-color--lightest);
    }
    .ctrl-btn {
        padding: 0.5rem 1rem;
        background: var(--md-accent-fg-color);
        border: none;
        border-radius: 4px;
        color: var(--md-accent-bg-color);
        font-family: monospace;
        font-weight: 700;
        cursor: pointer;
    }
    .ctrl-btn:hover {
        opacity: 0.9;
    }
    .line {
        padding: 2px 5px;
        cursor: pointer;
    }
    .line:hover {
        background: rgba(255,255,255,0.05);
    }
    .line.active {
        background: rgba(247, 163, 29, 0.2);
        border-left: 3px solid var(--md-accent-fg-color);
    }
    .stack-item {
        padding: 4px 8px;
        margin: 2px 0;
        background: rgba(255,255,255,0.05);
        border-radius: 3px;
        font-family: monospace;
    }
    .stack-item.new {
        background: rgba(74, 222, 128, 0.2);
        border-left: 3px solid #4ade80;
    }
    .var-item {
        padding: 4px 8px;
        margin: 2px 0;
        background: rgba(255,255,255,0.05);
        border-radius: 3px;
        font-family: monospace;
    }
    .var-item.updated {
        background: rgba(96, 165, 250, 0.2);
        border-left: 3px solid #60a5fa;
    }
</style>
{% endif %}
{% endblock %}
